<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Link QR Code Generator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.8); 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 300px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4a90e2;
        }

        label {
            font-size: 1rem;
            color: #666;
            display: block;
            margin-bottom: 10px;
            text-align: left;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #4a90e2;
            outline: none;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.5);
        }

        button {
            padding: 10px 20px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #357abd;
        }

        #qrcode {
            margin-top: 20px;
        }

        .logo {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .input-group .input-group-prepend {
            margin-right: 10px;
        }

        /* Responsive design */
        @media (max-width: 400px) {
            .container {
                width: 90%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Multi-Link QR Code Generator</h1>

        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png" alt="YouTube" class="logo">
                </span>
            </div>
            <input type="text" id="link1" class="form-control" placeholder="Enter YouTube link" oninput="validateLink('link1', 'youtube')">
        </div>

        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook" class="logo">
                </span>
            </div>
            <input type="text" id="link2" class="form-control" placeholder="Enter Facebook link" oninput="validateLink('link2', 'facebook')">
        </div>

        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/6/60/X_logo.svg/1200px-X_logo.svg.png" alt="X" class="logo">
                </span>
            </div>
            <input type="text" id="link3" class="form-control" placeholder="Enter X link" oninput="validateLink('link3', 'x')">
        </div>

        <div class="input-group">
            <div class="input-group-prepend">
                <span class="input-group-text">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2016.svg" alt="Instagram" class="logo">
                </span>
            </div>
            <input type="text" id="link4" class="form-control" placeholder="Enter Instagram link" oninput="validateLink('link4', 'instagram')">
        </div>

        <button onclick="generateQRCode()">Generate QR Code</button>
        <button onclick="resetFields()">Reset</button>

        <div id="qrcode"></div>
    </div>

    <script>
        function validateLink(linkId, type) {
            const linkValue = document.getElementById(linkId).value;
            let isValid = false;

            switch(type) {
                case 'youtube':
                    isValid = /^(https?:\/\/)?(www\.)?(youtube\.com\/(watch\?v=|embed\/|v\/|.*[?&]v=|user\/|channel\/|c\/)|youtu\.be\/|youtube\.com\/(?:@)?([a-zA-Z0-9._-]+))/.test(linkValue);
                    break;
                case 'facebook':
                    isValid = /^https?:\/\/(www\.)?facebook\.com\//.test(linkValue);
                    break;
                case 'x':
                    isValid = /^https?:\/\/(www\.)?x\.com\//.test(linkValue);
                    break;
                case 'instagram':
                    isValid = /^https?:\/\/(www\.)?instagram\.com\//.test(linkValue);
                    break;
            }

            if (!isValid) {
                alert(`Please enter a valid ${type.charAt(0).toUpperCase() + type.slice(1)} link.`);
                document.getElementById(linkId).value = '';
            }
        }

        function generateQRCode() {
            const link1 = document.getElementById('link1').value;
            const link2 = document.getElementById('link2').value;
            const link3 = document.getElementById('link3').value;
            const link4 = document.getElementById('link4').value;

            if (!link1 && !link2 && !link3 && !link4) {
                alert("Please enter at least one link");
                return;
            }

            const queryParams = new URLSearchParams({
                link1: link1 || '',
                link2: link2 || '',
                link3: link3 || '',
                link4: link4 || ''
            }).toString();

            const qrUrl = window.location.href.replace(/[^/]*$/, 'links.html?' + queryParams);

            const qrCodeElement = document.getElementById('qrcode');
            qrCodeElement.innerHTML = ''; // Clear previous QR codes
            new QRCode(qrCodeElement, {
                text: qrUrl,
                width: 128,
                height: 128
            });
        }

        function resetFields() {
            document.getElementById('link1').value = '';
            document.getElementById('link2').value = '';
            document.getElementById('link3').value = '';
            document.getElementById('link4').value = '';
            document.getElementById('qrcode').innerHTML = ''; // Clear QR code
        }
    </script>
</body>
</html>
